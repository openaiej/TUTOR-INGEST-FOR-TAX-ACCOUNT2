services:
  - type: web
    name: tutor-ingest-api
    runtime: python
    buildCommand: pip install uv && uv sync
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: INGEST_API_KEY
        sync: false
